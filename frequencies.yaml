# Lexor frequency-driven vocabulary priority queue.
#
# Goal: bulk vocabulary buildout in frequency order across multiple natural
# languages, so the most common concepts get assigned roots first. Words that
# rank high in multiple languages independently are universal-concept evidence
# and become highest priority. Words that appear in only one language are
# culturally-scoped and lower priority.
#
# Schema (per entry):
#   concept       (str, required) — canonical concept gloss.
#   en            (int, optional) — rank in SUBTLEX-US (lower = more frequent).
#   es            (int, optional) — rank in SUBTLEX-ESP.
#   la            (int, optional) — rank in Diederich's basic Latin list.
#   universal     (int, derived)  — sum-of-reciprocal-ranks score; entries
#                                   appearing in all three with low rank
#                                   bubble to the top. Filled in by a
#                                   future build script.
#   assigned_root (str, optional) — when a root has been chosen and entered
#                                   into lexicon.yaml. Lets us track coverage.
#   notes         (str, optional)
#
# Seeding strategy:
#   1. Manual seed below covers obvious universals — pronouns, basic verbs,
#      core nouns, body parts, kinship. These are inserted with rough rank
#      estimates rather than fetched from corpora (which is a separate task).
#   2. Bulk ingest from SUBTLEX-US, SUBTLEX-ESP, and a Latin frequency list
#      will replace these placeholders with real corpus-derived ranks. Script
#      to fetch and dedup by concept is planned (see tasks.md).
#
# Rank conventions:
#   - Ranks are integers >= 1. Use 1-99 for "almost certainly top-100 in this
#     language," 100-499 for top-500, etc. Seed estimates use this granularity
#     until real data lands.
#   - Missing language field = not in that language's top-N frequency list.
#
# Status tracking:
#   - "assigned_root" filled in once the root makes it into lexicon.yaml.
#   - Concepts already covered by current lexicon.yaml are listed in the
#     "Already assigned" block below for completeness.

