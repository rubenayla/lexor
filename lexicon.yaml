# Lexor lexicon — single source of truth for all locked roots.
#
# Schema (per entry):
#   root            (str, required)   — the surface form (CV, CVC, prefix, etc.).
#   kind            (str, required)   — broad class: pronoun | digit | marker |
#                                       preposition | quantifier | copula |
#                                       coordinator | time_unit | verb |
#                                       noun | adj | adv | ...
#   concept         (str, required)   — concept-level gloss (the *meaning*, not a POS).
#   semantic_parent (str, optional)   — gloss of the broader concept this slots under.
#                                       Tree emerges from these links without needing
#                                       a pre-designed ontology.
#   source          (str, optional)   — etymological / mnemonic source.
#   freq_rank       (int, optional)   — merged frequency rank (lower = more frequent).
#                                       Populated after frequencies.yaml is built.
#   notes           (str, optional)   — anything else worth remembering.
#
# Editing rules:
#   - Adding a root: append an entry. Run scripts/check_collisions.py.
#   - Never reuse a root surface form for two distinct concepts unless decisions.md
#     explicitly locks the overload (currently only `samo`).
#   - Closed-class roots (markers, prepositions, quantifiers, copulas, coordinators,
#     digits, pronouns) cannot be re-purposed by adding more entries — those classes
#     are frozen except by an explicit decisions.md update.

# =============================================================================
# PRONOUNS (CV / CCV, special shape — not CVC)
# =============================================================================

- {root: y,  kind: pronoun, concept: "I/me",                 source: "speaker-vowel /y/"}
- {root: u,  kind: pronoun, concept: "you (sg)",             source: "listener-vowel /u/"}
- {root: e,  kind: pronoun, concept: "he/she/they (sg)",     source: "external-third /e/"}
- {root: la, kind: pronoun, concept: "we (generic)",         source: "plural-marker l + neutral vowel"}
- {root: lc, kind: pronoun, concept: "we (inclusive)",       source: "plural-marker l + /æ/"}
- {root: ly, kind: pronoun, concept: "you (plural)",         source: "l + speaker-excluded vowel"}
- {root: lu, kind: pronoun, concept: "me and him/her",       source: "l + listener-excluded vowel"}
- {root: le, kind: pronoun, concept: "we (you and me)",      source: "l + third-excluded vowel"}
- {root: lo, kind: pronoun, concept: "they (people, pl)",    source: "l + third-person vowel"}
- {root: i,  kind: pronoun, concept: "it (object/concept)",  source: "object vowel /i/"}
- {root: li, kind: pronoun, concept: "they (objects, pl)",   source: "l + object vowel"}

