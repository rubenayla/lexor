- {root: bra,   kind: marker, concept: "group-open (paren-like)",   source: "English bracket (bra-ket split)", notes: "Pairs with `fin`-style closer `ket`. Used to group a sub-constituent inside a clause so operators bind unambiguously. Breaks digit-stream auto-fuse."}
- {root: ket,   kind: marker, concept: "group-close",                source: "English bracket (bra-ket split)", notes: "Closes a `bra`-opened group. Nesting allowed (each `ket` matches the nearest unmatched `bra`)."}

