# =============================================================================
# MATERIAL / MECHANICAL PROPERTIES (H2 neutral-axis qualities + base quantities)
# Named engineering properties are COMPOSITIONS, not roots (decisions.md
# 2026-06-07). Energy decomposes by deformation regime via the recoverability
# adjective `las`, so plastic-only energy — which English cannot name in one
# word — is expressible: `mezi ner ze-lasasa <X>`.
# =============================================================================
- {root: tes, kind: noun, concept: "mechanical stress (force per area, sigma)",     semantic_parent: "physical_property", source: "Latin tensio",    notes: "Strength = mezi tes tepa rup <X> (stress at fracture). Stiffness / elastic modulus = mezi tes kexu dis <X> (stress per strain)."}
- {root: dis, kind: noun, concept: "strain / relative deformation (epsilon)",       semantic_parent: "physical_property", source: "distortion",       notes: "Ductility = mezi dis ze-lasasa <X> (non-recoverable strain capacity); brittle = that, minu."}
- {root: ner, kind: noun, concept: "energy",                                        semantic_parent: "physical_property", source: "Greek energeia",   notes: "Absorbed-deformation energy = area under stress-strain. Toughness = mezi ner <X> (total to fracture); resilience = mezi ner lasasa <X> (recoverable part); plastic energy = mezi ner ze-lasasa <X>. toughness = resilience + plastic energy."}
- {root: las, kind: adj,  concept: "deformation recoverability / springiness",      semantic_parent: "physical_property", source: "Greek elastikos",  notes: "H2 neutral axis. elastic = lasasa (recoverable, positive default); plastic = ze-lasasa (non-recoverable, x0). Scopes a quantity to the elastic vs plastic regime (see resilience / ductility)."}
- {root: dus, kind: adj,  concept: "hardness (resistance to indentation/scratch)",  semantic_parent: "physical_property", source: "Latin durus",      notes: "H2 neutral axis. hard = dusasa; soft = mi-dusasa / dusasa minu; hardness of X = mezi dus X. Distinct from stiffness (mezi tes kexu dis) and from toughness."}
- {root: rup, kind: noun, concept: "fracture / break / mechanical failure",         semantic_parent: "physical_property", source: "Latin rumpere",     notes: "The failure event. Strength = stress at fracture = mezi tes tepa rup <X>."}

