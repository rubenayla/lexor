# =============================================================================
# MARKERS (closed-class operators)
# =============================================================================

- {root: "no-", kind: marker, concept: "logical negation (prefix)", source: "English/Spanish/Latin no"}
- {root: ka,    kind: marker, concept: "universal question particle"}
- {root: ke,    kind: marker, concept: "universal complementizer",  source: "Spanish/French que"}
- {root: is,    kind: marker, concept: "causal conditional (if)"}
- {root: dat,   kind: marker, concept: "premise / given that",      source: "Latin datum"}
- {root: erg,   kind: marker, concept: "therefore / inference",     source: "Latin ergo"}
- {root: imp,   kind: marker, concept: "formal logical implication"}
- {root: lit,   kind: marker, concept: "literal open (quote)"}
- {root: fin,   kind: marker, concept: "literal close (end-quote)", source: "Latin finis"}
- {root: var,   kind: marker, concept: "variable/placeholder (prefix on one word)"}
