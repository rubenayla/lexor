# =============================================================================
# MARKERS (closed-class operators)
# =============================================================================

- {root: "no-", kind: marker, concept: "logical negation / complement (prefix, ≠)", source: "English/Spanish/Latin no", notes: "Polarity family with mi-/ze-. Outermost: scopes over a mi-/ze- derived concept (no-mi-X = 'not opposite-of-X'). Proposition/predicate-level."}
- {root: "mi-", kind: marker, concept: "contrary / opposite pole (prefix, ×−1)",  source: "Latin minus; echoes quantifier minu", notes: "Bound prefix. Gradable BIPOLAR roots only (pretty/ugly, love/hate, hot/cold): mi-[pretty] = ugly. No ×−1 on unipolar scales — use postposed minu for 'less tough'. Mutually exclusive with ze- on one root. Exempt from subclass-vowel scheme like no-."}
- {root: "ze-", kind: marker, concept: "privative / absence (prefix, ×0)",          source: "zero; echoes digit zo",            notes: "Bound prefix. Any scalar root: ze-[color] = colorless; on a bipolar scale lands on the neutral midpoint. Mutually exclusive with mi- on one root. Compositional equivalent = samo zo. Exempt from subclass-vowel scheme like no-."}
- {root: ka,    kind: marker, concept: "universal question particle"}
- {root: ke,    kind: marker, concept: "universal complementizer",  source: "Spanish/French que"}
- {root: isi,    kind: marker, concept: "causal conditional (if)"}
- {root: dati,   kind: marker, concept: "premise / given that",      source: "Latin datum"}
- {root: ergi,   kind: marker, concept: "therefore / inference",     source: "Latin ergo"}
- {root: impi,   kind: marker, concept: "formal logical implication"}
- {root: liti,   kind: marker, concept: "literal open (quote)"}
- {root: fini,   kind: marker, concept: "literal close (end-quote)", source: "Latin finis"}
- {root: vari,   kind: marker, concept: "variable/placeholder (prefix on one word)"}
- {root: defi,   kind: marker, concept: "named-binding introducer",  source: "math/CS def"}
- {root: bra,   kind: marker, concept: "group-open (paren-like)",   source: "English bracket (bra-ket split)", notes: "Pairs with `fini`-style closer `keti`. Used to group a sub-constituent inside a clause so operators bind unambiguously. Breaks digit-stream auto-fuse."}
- {root: keti,   kind: marker, concept: "group-close",                source: "English bracket (bra-ket split)", notes: "Closes a `bra`-opened group. Nesting allowed (each `keti` matches the nearest unmatched `bra`)."}
- {root: kani,   kind: marker, concept: "epistemic possibility (may/can/possibly)", source: "English can / German kann / Dutch kan / Swedish kan", notes: "Sentence-initial; scopes over the rest of the clause. Composes with `no-`. Dual of `musi` but locked directly to avoid forced composition. Epistemic flavor only — deontic permission parked."}
- {root: musi,   kind: marker, concept: "epistemic necessity (must/necessarily)",   source: "English must / German muss",                                  notes: "Sentence-initial; scopes over the rest of the clause. Composes with `no-`. Dual of `kani`. Epistemic flavor only — deontic obligation parked."}

# Axis system (G3/G4/G5 closures, 2026-05-16)
- {root: aksi,   kind: marker, concept: "axis (1D directed line, unsigned)",        source: "English axis / Latin axis",     notes: "Composes with spatial preposition for agent-frame axis (`aksi fasa` = X, `aksi lata` = Y, `aksi sura` = Z); with digit for object-frame rank (`aksi pa` = longest, `aksi du` = middle, `aksi re` = shortest). Polarity added via `magu` (+) / `minu` (-)."}
- {root: tipi,   kind: marker, concept: "endpoint / extremum along an axis",        source: "English tip",                   notes: "Composes with `aksi <axis> <polarity>` to locate the extreme point. `tipi aksi sura magu bra X keti` = the top of X. Distinguishes 'top' (location) from 'up' (direction)."}
- {root: mezi,   kind: marker, concept: "magnitude along an axis or scalar quality", source: "Spanish/Latin medir/metiri", notes: "Geometric: `mezi aksi pa bra X keti` = the longest dimension of X. Generalized 2026-06-07 to ANY scalar quality: `mezi bel X` = the degree of beauty of X. This is the neutral, direction-free magnitude term for a gradable concept (H2). Bridges axes/qualities to numeric magnitudes."}

# Graded probability (closes D6, 2026-05-16)
- {root: chani,  kind: marker, concept: "graded epistemic probability — P(X) = N",  source: "English/French/Spanish chance",  notes: "Sentence-initial; scopes over the rest of the clause. Takes a numeric expression first (the probability in [0,1]), then the proposition. `chani zo demu ne zo pluve` = 'it will rain with probability 0.90.' Scalar version of `kani` (◇) and `musi` (□): `chani zo` ≡ `no- kani`, `chani pa` ≡ `musi`. Composes with comparison operators inside the numeric slot: `chani magu zo demu fi X` = 'P(X) > 0.5.'"}

